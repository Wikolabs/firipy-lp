name: Deploy wefreep

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.WIKOLABS_VM_SSH_KEY }}
          VM_HOST: ${{ secrets.WIKOLABS_VM_HOST }}
          VM_USER: ${{ secrets.WIKOLABS_VM_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$VM_USER@$VM_HOST" "set -e; [ ! -d /opt/wefreep/.git ] && git clone https://github.com/Wikolabs/wefreep.git /opt/wefreep; cd /opt/wefreep && git pull origin main && docker build -t wefreep:local . && (docker stop wefreep 2>/dev/null; docker rm wefreep 2>/dev/null; true) && docker run -d --name wefreep -p 3054:3000 --restart unless-stopped wefreep:local && echo 'Deployed wefreep on port 3054'"
